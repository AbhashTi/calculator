---
- name: Pull Docker Image of Calculator
  hosts: all

  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:

    - name: Pull image
      docker_image:
        name: abhashti/calculator:latest
        source: pull

    - name: Start Docker service
      service:
        name: docker
        state: started

    - name: Running container
      shell: docker run -it -d --name Calculator abhashti/calculator:latest
